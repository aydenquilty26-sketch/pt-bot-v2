<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT — trading bot dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0B0D0E; --panel:#14171A; --border:#262B2F;
    --text:#E7E5DE; --muted:#8A8D85;
    --green:#5DCAA5; --green-dim:#0F6E56;
    --red:#F0997B; --red-dim:#993C1D;
    --amber:#EF9F27;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    padding:32px 20px 60px;
  }
  .wrap{max-width:960px; margin:0 auto;}
  header{display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:12px; margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:16px;}
  h1{font-size:20px; font-weight:500; margin:0; letter-spacing:0.02em;}
  h1 span{color:var(--muted); font-weight:400;}
  #mode-badge{font-family:ui-monospace,Menlo,monospace; font-size:12px; padding:3px 10px; border-radius:20px; border:1px solid var(--border); text-transform:uppercase; letter-spacing:0.08em;}
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:24px;}
  .stat{background:var(--panel); padding:16px 18px;}
  .stat .label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}
  .stat .value{font-family:ui-monospace,Menlo,monospace; font-size:22px; font-weight:500;}
  #halt-banner{display:none; background:var(--red-dim); color:#FCEBEB; border-radius:8px; padding:12px 16px; margin-bottom:20px; font-size:14px;}
  .panel{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px;}
  .panel h2{font-size:13px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin:0 0 16px;}
  canvas{max-height:260px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; color:var(--muted); font-weight:400; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; padding:8px 10px; border-bottom:1px solid var(--border);}
  td{padding:8px 10px; border-bottom:1px solid var(--border); font-family:ui-monospace,Menlo,monospace; white-space:nowrap;}
  tr:last-child td{border-bottom:none;}
  .tag{display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; text-transform:uppercase; letter-spacing:0.04em;}
  .tag.buy{background:rgba(93,202,165,0.15); color:var(--green);}
  .tag.sell{background:rgba(240,153,123,0.15); color:var(--red);}
  .tag.none{background:rgba(138,141,133,0.12); color:var(--muted);}
  .tag.approved{color:var(--green);}
  .tag.rejected{color:var(--red);}
  .empty{color:var(--muted); font-size:13px; padding:20px 0; text-align:center;}
  footer{color:var(--muted); font-size:12px; text-align:center; margin-top:32px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>PT <span>— paper trading bot v2</span></h1>
    <span id="mode-badge">loading</span>
  </header>

  <div id="halt-banner"></div>

  <div class="stat-grid">
    <div class="stat"><div class="label">Starting balance</div><div class="value" id="stat-start">—</div></div>
    <div class="stat"><div class="label">Equity now</div><div class="value" id="stat-equity">—</div></div>
    <div class="stat"><div class="label">Total gain/loss</div><div class="value" id="stat-pnl">—</div></div>
    <div class="stat"><div class="label">Cash</div><div class="value" id="stat-cash">—</div></div>
    <div class="stat"><div class="label">In positions</div><div class="value" id="stat-positions">—</div></div>
    <div class="stat"><div class="label">Last update</div><div class="value" id="stat-updated" style="font-size:14px;">—</div></div>
  </div>

  <div class="panel">
    <h2>Equity over time</h2>
    <canvas id="equity-chart"></canvas>
  </div>

  <div class="panel">
    <h2>Recent decisions</h2>
    <div id="cycles-table"></div>
  </div>

  <footer>Data refreshes each time the bot runs on schedule. This is a static page reading a JSON file — no server involved.</footer>
</div>

<script>
async function loadDashboard() {
  let data;
  try {
    const res = await fetch('data.json?_=' + Date.now());
    data = await res.json();
  } catch (e) {
    document.getElementById('cycles-table').innerHTML = '<div class="empty">No data yet — the bot hasn\'t run.</div>';
    return;
  }

  document.getElementById('mode-badge').textContent = data.mode || 'unknown';

  if (data.halted) {
    const banner = document.getElementById('halt-banner');
    banner.style.display = 'block';
    const reason = (data.recent_halts && data.recent_halts[0]) ? data.recent_halts[0].reason : 'unknown reason';
    banner.textContent = 'HALTED — ' + reason;
  }

  const eq = data.equity_history || [];
  if (eq.length) {
    const last = eq[eq.length - 1];
    document.getElementById('stat-equity').textContent = '$' + Number(last.equity).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('stat-cash').textContent = '$' + Number(last.cash).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('stat-positions').textContent = '$' + Number(last.positions_value).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('stat-updated').textContent = new Date(last.timestamp).toLocaleString();
  }

  if (data.starting_equity != null) {
    document.getElementById('stat-start').textContent = '$' + Number(data.starting_equity).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  if (data.total_pnl != null) {
    const pnl = Number(data.total_pnl);
    const pnlPct = Number(data.total_pnl_pct);
    const sign = pnl >= 0 ? '+' : '';
    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = `${sign}$${pnl.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})} (${sign}${pnlPct.toFixed(2)}%)`;
    pnlEl.style.color = pnl >= 0 ? 'var(--green)' : 'var(--red)';
  }

  // Decisions table renders independently of the chart below, so a chart
  // problem can never hide this data.
  const cycles = data.recent_cycles || [];
  if (cycles.length) {
    let rows = cycles.map(c => `
      <tr>
        <td>${new Date(c.timestamp).toLocaleString()}</td>
        <td>${c.ticker}</td>
        <td>${c.composite_score ?? '—'}</td>
        <td><span class="tag ${c.action}">${c.action}</span></td>
        <td><span class="tag ${c.risk_decision === 'approved' ? 'approved' : (c.risk_decision === 'rejected' ? 'rejected' : '')}">${c.risk_decision}</span></td>
        <td>${c.risk_reason || ''}</td>
      </tr>`).join('');
    document.getElementById('cycles-table').innerHTML = `
      <table>
        <thead><tr><th>Time</th><th>Ticker</th><th>Score</th><th>Action</th><th>Risk</th><th>Reason</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    document.getElementById('cycles-table').innerHTML = '<div class="empty">No decisions logged yet.</div>';
  }

  // Chart is wrapped separately - if this fails for any reason, everything
  // above (stats, decisions table) has already rendered successfully.
  if (eq.length) {
    try {
      new Chart(document.getElementById('equity-chart'), {
        type: 'line',
        data: {
          labels: eq.map(p => new Date(p.timestamp).toLocaleDateString()),
          datasets: [{
            data: eq.map(p => p.equity),
            borderColor: '#5DCAA5',
            backgroundColor: 'rgba(93,202,165,0.08)',
            fill: true,
            tension: 0.25,
            pointRadius: 0,
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8A8D85', maxTicksLimit: 8 }, grid: { color: '#262B2F' } },
            y: { ticks: { color: '#8A8D85' }, grid: { color: '#262B2F' } }
          }
        }
      });
    } catch (e) {
      console.error('Chart render failed:', e);
    }
  }
}

loadDashboard();
</script>
</body>
</html>
