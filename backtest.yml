name: PT Backtest Sweep

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pilot run first (5 tickers, 8 combos) to gauge timing, or full sweep (35 tickers, 216 combos)"
        required: true
        type: choice
        options:
          - quick
          - full
        default: quick

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest sweep
        env:
          QUICK: ${{ github.event.inputs.mode == 'quick' && '1' || '0' }}
        run: |
          python -m backtest.run_sweep

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.event.inputs.mode }}
          path: backtest/results/*.csv
          retention-days: 30
